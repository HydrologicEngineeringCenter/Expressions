plugins {
    // Apply the java-library plugin for API and implementation separation.
    id 'java-library'
    id 'maven-publish'
    id "com.palantir.git-version" version "3.0.0"
}

group = "mil.army.usace.hec"
version = "1.0.0"

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit test framework.
    testImplementation(libs.junit)

    // This dependency is exported to consumers, that is to say found on their compile classpath.
    api(libs.commons.math3)

    // This dependency is used internally, and not exposed to consumers on their own compile classpath.
    implementation(libs.guava)
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

def versionLabel(gitInfo) {
    // A release is published by tagging the master branch with "vX.Y" (e.g. v1.1).
    // The same tag versions all jars uniformly; the leading "v" is stripped so the
    // artifact version is just the number (e.g. 1.1).
    //
    // The release version is used ONLY when HEAD is exactly on the tagged commit with a
    // clean tree (isCleanTag). Any commit past the tag — including later branch merges —
    // falls back to -SNAPSHOT. Without the isCleanTag guard, lastTag returns the nearest
    // reachable tag, so every build after a vX.Y tag would keep re-publishing that release
    // version from unreleased code until a newer tag superseded it.
    def tag = gitInfo.lastTag?.trim()
    println(tag)
    if (gitInfo.isCleanTag && tag && tag ==~ /v\d+(\.\d+)*/) {
        return tag.substring(1)
    }
    return "-SNAPSHOT"
}

publishing {
    version = versionLabel(versionDetails())
    println("selected tag: " + version)
    publications {
        mavenJava(MavenPublication) {
            from components.java
                    groupId = 'mil.army.usace.hec'
            artifactId = 'expressions'
        }
    }
    repositories {
        maven {
            name = "hecNexus"
            credentials {
                username = System.getenv("MAVEN_USERNAME")
                password = System.getenv("MAVEN_PASSWORD")
            }
            def releasesRepoUrl = "https://www.hec.usace.army.mil/nexus/repository/maven-releases/"
            def snapshotsRepoUrl = "https://www.hec.usace.army.mil/nexus/repository/maven-snapshots/"
            url = version.endsWith('SNAPSHOT') ? snapshotsRepoUrl : releasesRepoUrl
        }
    }
}

publish.dependsOn(build)

build {
    dependsOn jar
}